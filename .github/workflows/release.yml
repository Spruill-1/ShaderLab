name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1.0). Leave empty when triggered by tag push.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            msbuild_platform: x64
          - platform: arm64
            msbuild_platform: ARM64

    env:
      Solution_Path: ShaderLab.slnx
      Configuration: Release
      Platform: ${{ matrix.msbuild_platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') {
            $env:GITHUB_REF -replace '^refs/tags/',''
          } elseif ('${{ github.event.inputs.version }}') {
            '${{ github.event.inputs.version }}'
          } else { 'v0.0.0-dev' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release tag: $tag"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet restore
        run: nuget restore "${{ env.Solution_Path }}" -SolutionDirectory .

      - name: Build loose-file MSIX layout
        shell: pwsh
        run: |
          msbuild "${{ env.Solution_Path }}" `
            /p:Configuration=${{ env.Configuration }} `
            /p:Platform=${{ env.Platform }} `
            /p:AppxBundle=Never `
            /p:AppxPackageSigningEnabled=false `
            /p:GenerateAppxPackageOnBuild=true `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /m /nologo /v:minimal

      - name: Collect release artifacts
        id: collect
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE 'release-stage'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Find the VS-produced sideload bundle dir (contains the .msix + Dependencies\).
          # Filter to the matching platform to avoid picking up other-arch outputs.
          $platform = '${{ matrix.platform }}'
          $msbuildPlatform = '${{ matrix.msbuild_platform }}'
          $msix = Get-ChildItem -Recurse -Path AppPackages -Filter '*.msix' -File `
            | Where-Object { $_.FullName -match "_${msbuildPlatform}[_\\.]" -or $_.Directory.FullName -match "_${msbuildPlatform}_" } `
            | Sort-Object FullName | Select-Object -First 1
          if (-not $msix) {
            # Fallback: pick first .msix whose parent folder name contains the platform.
            $msix = Get-ChildItem -Recurse -Path AppPackages -Filter '*.msix' -File `
              | Sort-Object FullName | Select-Object -First 1
          }
          if (-not $msix) {
            Write-Host "Contents of AppPackages:" -ForegroundColor Yellow
            Get-ChildItem -Recurse -Path AppPackages | Select-Object FullName | Format-Table -AutoSize
            throw "No .msix file found under AppPackages."
          }
          $bundleDir = $msix.Directory.FullName
          Write-Host "Using bundle: $bundleDir"

          $version = '${{ steps.ver.outputs.tag }}' -replace '^v',''
          $zip = Join-Path $stage "ShaderLab-$version-$platform.zip"

          # Copy install script alongside the msix, then zip the whole bundle.
          Copy-Item -Force scripts/Install.ps1 (Join-Path $bundleDir 'Install.ps1')
          Compress-Archive -Path "$bundleDir\*" -DestinationPath $zip -Force

          Get-ChildItem $stage | ForEach-Object { Write-Host "Staged: $($_.Name)" }
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShaderLab-${{ steps.ver.outputs.tag }}-${{ matrix.platform }}
          path: ${{ steps.collect.outputs.stage }}
          retention-days: 90

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ShaderLab-${{ steps.ver.outputs.tag }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ShaderLab ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*.zip
